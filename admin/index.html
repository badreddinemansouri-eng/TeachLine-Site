<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Teach line</title>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
    <div id="log" style="background:#f0f0f0; padding:10px; font-family:monospace;"></div>
    <script>
        function log(msg) {
            console.log(msg);
            const div = document.getElementById('log');
            div.innerHTML += msg + '<br>';
        }
        log("1. Script démarré");

        let token = localStorage.getItem('github_token');
        if (!token) {
            token = prompt("Entrez votre token GitHub (scopes repo)");
            if (token) localStorage.setItem('github_token', token);
        }
        log("2. Token " + (token ? "présent" : "manquant"));

        if (token) {
            log("3. Attente de Decap CMS...");
            function initCMS() {
                if (window.CMS) {
                    log("4. Decap CMS trouvé. Initialisation...");
                    try {
                        window.CMS.init({
                            config: '/admin/config.yml',
                            backend: {
                                name: 'github',
                                repo: 'badreddinemansouri-eng/TeachLine-Site',
                                branch: 'main',
                                auth_type: 'token',
                                token: token
                            }
                        });
                        log("5. Initialisation lancée.");
                    } catch(e) {
                        log("ERREUR : " + e.message);
                    }
                } else {
                    log("4. En attente... (CMS pas encore chargé)");
                    setTimeout(initCMS, 100);
                }
            }
            initCMS();
        } else {
            document.body.innerHTML = '<h1>Token requis</h1>';
        }
    </script>
</body>
</html>
