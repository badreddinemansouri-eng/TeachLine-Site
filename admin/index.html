<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teach line - Administration</title>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <script>
        // Attendre le chargement complet de Decap CMS
        window.addEventListener('load', function() {
            if (typeof window.CMS !== 'undefined') {
                window.CMS.init({ config: '/admin/config.yml' });
            } else {
                // Sécurité : réessayer après un court délai
                setTimeout(function() {
                    if (window.CMS) window.CMS.init({ config: '/admin/config.yml' });
                }, 500);
            }
        });
    </script>
</body>
</html>
