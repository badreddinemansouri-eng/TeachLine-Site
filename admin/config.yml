backend:
  name: github
  repo: badreddinemansouri-eng/TeachLine-Site   # Votre dépôt
  branch: main
  auth_endpoint: https://teachline.netlify.app/auth   # facultatif, on n'utilise pas OAuth
  # On utilisera un token directement, donc pas besoin d'endpoint

media_folder: "static/images"
public_folder: "/static/images"

collections:
  - name: "posts"
    label: "Actualités"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", default: "" }
      - { label: "Catégorie", name: "category", widget: "select", options: ["Annonce", "Résumé", "Cours vidéo"] }
      - { label: "Contenu", name: "body", widget: "markdown" }
      - { label: "Lien", name: "link", widget: "string", required: false }

  - name: "resumes"
    label: "Résumés PDF"
    folder: "content/resumes"
    create: true
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Description", name: "body", widget: "text" }
      - { label: "Fichier PDF", name: "pdf_file", widget: "file" }
      - { label: "Matière", name: "category", widget: "string", default: "Sciences" }
