# Configuration des médias (images, PDF, etc.)
media:
  input: static/images
  output: /static/images

# Collections de contenu
collections:
  # ----- ACTUALITÉS (posts) -----
  - name: posts
    label: Actualités
    label_singular: Actualité
    description: Articles, annonces, ou nouvelles publiées sur le site
    path: content/posts
    format: yaml-frontmatter
    create: true
    fields:
      - { name: title, label: Titre, type: string, required: true }
      - { name: date, label: Date, type: date, default: "{{now}}", required: true }
      - { name: category, label: Catégorie, type: select, options: ["Annonce", "Résumé", "Cours vidéo", "Événement"], default: "Annonce" }
      - { name: body, label: Contenu principal, type: rich-text }
      - { name: image, label: Image de couverture, type: image, required: false }
      - { name: video_url, label: Lien vidéo (YouTube/Vimeo), type: string, required: false, pattern: '^https?://(www\.)?(youtube\.com|youtu\.be|vimeo\.com).*', placeholder: "https://youtu.be/..." }
      - { name: isPremium, label: Contenu payant (réservé aux abonnés), type: boolean, default: false }
      - { name: link, label: Lien externe (optionnel), type: string, required: false }

  # ----- RÉSUMÉS PDF (documents téléchargeables) -----
  - name: resumes
    label: Résumés PDF
    label_singular: Résumé
    description: Fiches de révision, cours condensés, documents à télécharger
    path: content/resumes
    format: yaml-frontmatter
    create: true
    fields:
      - { name: title, label: Titre du résumé, type: string, required: true }
      - { name: subject, label: Matière, type: string, default: "Sciences", required: true }
      - { name: level, label: Niveau, type: select, options: ["Bac Math", "Bac Info", "Bac Sciences", "Tous niveaux"], default: "Tous niveaux" }
      - { name: description, label: Description courte, type: text, required: true }
      - { name: pdf_file, label: Fichier PDF, type: file, required: true }
      - { name: preview_image, label: Image d'aperçu (optionnelle), type: image, required: false }
      - { name: isPremium, label: Document payant (réservé aux abonnés), type: boolean, default: false }

  # ----- VIDÉOS (collection dédiée, optionnelle) -----
  - name: videos
    label: Cours vidéo
    label_singular: Vidéo
    description: Séances de cours enregistrées
    path: content/videos
    format: yaml-frontmatter
    create: true
    fields:
      - { name: title, label: Titre de la vidéo, type: string, required: true }
      - { name: date, label: Date de publication, type: date, default: "{{now}}" }
      - { name: subject, label: Matière, type: string, required: true }
      - { name: video_url, label: Lien vidéo (YouTube/Vimeo), type: string, required: true, pattern: '^https?://(www\.)?(youtube\.com|youtu\.be|vimeo\.com).*' }
      - { name: description, label: Description, type: text, required: false }
      - { name: duration, label: Durée (optionnelle), type: string, placeholder: "12:34" }
      - { name: isPremium, label: Vidéo payante (réservée aux abonnés), type: boolean, default: false }

  # ----- PAGES STATIQUES (ex: À propos, Contact, etc.) -----
  - name: pages
    label: Pages statiques
    label_singular: Page
    description: Pages fixes du site (Accueil, Contact, Mentions légales…)
    path: content/pages
    format: yaml-frontmatter
    create: true
    fields:
      - { name: title, label: Titre de la page, type: string, required: true }
      - { name: slug, label: Adresse (slug), type: string, hint: "ex: a-propos", required: true }
      - { name: body, label: Contenu, type: rich-text }
      - { name: order, label: Ordre d'affichage (menu), type: number, default: 0 }
      - { name: show_in_menu, label: Afficher dans le menu principal, type: boolean, default: true }